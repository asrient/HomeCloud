name: Android App Build

on:
  push:
    tags: ["mobile-v*"]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/gradle/wrapper/gradle-wrapper.properties', 'mobile/android/**/*.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        working-directory: ./mobile
        run: yarn install --frozen-lockfile

      - name: Verify version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        working-directory: ./mobile
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          TAG=${TAG#mobile-v}
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          if [ "$TAG" != "$APP_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match app.json version ($APP_VERSION)"
            exit 1
          fi
          echo "Version verified: $APP_VERSION"

      - name: Expo prebuild (generate native project)
        working-directory: ./mobile
        run: npx expo prebuild --clean --platform android

      - name: Set up release keystore
        working-directory: ./mobile/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
          cat <<EOF >> gradle.properties
          MYAPP_UPLOAD_STORE_FILE=release.keystore
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build AAB (Android App Bundle)
        working-directory: ./mobile/android
        run: ./gradlew bundleRelease --no-daemon

      - name: Build APK
        working-directory: ./mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: homecloud-release-aab
          path: mobile/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: homecloud-release-apk
          path: mobile/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile/android/app/build/outputs/bundle/release/*.aab
            mobile/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
