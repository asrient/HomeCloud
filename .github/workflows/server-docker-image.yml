name: Server Docker Image CI

# Manual-only. The image installs the published npm package, so publish
# to npm first ("Server npm Publish"), then trigger this with the same version.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Published npm version (e.g. 0.0.8). Must already exist on npmjs.org.'
        required: true
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version is published on npm
        run: |
          VERSION="${{ inputs.version }}"
          PUBLISHED=$(npm view "@asrient/homecloud-server@${VERSION}" version 2>/dev/null || true)
          if [ "$PUBLISHED" != "$VERSION" ]; then
            echo "::error::Version ${VERSION} is not published to npm. Run 'Server npm Publish' first."
            exit 1
          fi
          echo "Verified @asrient/homecloud-server@${VERSION} is published."

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          build-args: |
            SERVER_VERSION=${{ inputs.version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/homecloud-server:latest
            ${{ secrets.DOCKER_USERNAME }}/homecloud-server:${{ inputs.version }}
